<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PERFORMACE IAIT - ANALISTAS</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Firebase Compat (funciona direto no navegador sem build) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- SheetJS -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="header-brand">
        <div class="brand-icon">📊</div>
        <div>
          <h1 class="brand-title">PERFORMACE IAIT - ANALISTAS</h1>
          <p class="brand-sub" id="currentMonthLabel">Carregando...</p>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn btn-ghost" id="btnHistory">📅 Histórico</button>
        <button class="btn btn-outline" id="btnExcel">⬇ Excel</button>
        <button class="btn btn-primary" id="btnAddEntry">+ Registrar</button>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main">

    <section class="cards-row" id="summaryCards">
      <div class="card card-blue">
        <span class="card-label">Total do Mês</span>
        <span class="card-value" id="cardTotal">0</span>
        <span class="card-sub">análises</span>
      </div>
      <div class="card card-orange">
        <span class="card-label">Reprovadas</span>
        <span class="card-value" id="cardReprovadas">0</span>
        <span class="card-sub">do mês</span>
      </div>
      <div class="card card-teal">
        <span class="card-label">Ajustadas/Finalizadas</span>
        <span class="card-value" id="cardFinalizadas">0</span>
        <span class="card-sub">do mês</span>
      </div>
      <div class="card card-purple">
        <span class="card-label">Analistas</span>
        <span class="card-value" id="cardAnalistas">0</span>
        <span class="card-sub">ativos hoje</span>
      </div>
    </section>

    <section class="grid-main">
      <div class="panel panel-table">
        <div class="panel-header">
          <h2>Registros do Mês</h2>
          <div class="panel-actions">
            <select id="filterAnalista" class="select-sm">
              <option value="">Todos</option>
            </select>
          </div>
        </div>
        <div class="table-scroll">
          <table class="data-table" id="mainTable">
            <thead><tr id="tableHead"></tr></thead>
            <tbody id="tableBody"></tbody>
            <tfoot id="tableFoot"></tfoot>
          </table>
        </div>
      </div>

      <div class="panel panel-metas">
        <div class="panel-header">
          <h2>Meta do Dia</h2>
          <input type="date" id="metaDate" class="select-sm" />
        </div>
        <div class="metas-grid" id="metasGrid"></div>
      </div>
    </section>

  </main>

  <!-- MODAL: REGISTRAR -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalEntry">
      <div class="modal-header">
        <h3 id="modalTitle">Registrar Análise</h3>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <label>Data</label>
            <input type="date" id="inputDate" class="input" />
          </div>
          <div class="form-group">
            <label>Analista</label>
            <select id="inputAnalista" class="input">
              <option value="">Selecionar...</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Reprovadas</label>
            <input type="number" id="inputReprovada" class="input" min="0" value="0" />
          </div>
          <div class="form-group">
            <label>Ajustadas/Finalizadas</label>
            <input type="number" id="inputFinalizada" class="input" min="0" value="0" />
          </div>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="inputStatus" class="input">
            <option value="normal">Normal</option>
            <option value="DM">DM (Dispensado/Folga)</option>
            <option value="absent">Ausente —</option>
          </select>
        </div>
        <div class="form-actions">
          <button class="btn btn-ghost" id="btnModalCancel">Cancelar</button>
          <button class="btn btn-primary" id="btnModalSave">Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL: HISTÓRICO -->
  <div class="modal-overlay" id="historyOverlay">
    <div class="modal modal-wide" id="modalHistory">
      <div class="modal-header">
        <h3>Histórico de Meses Anteriores</h3>
        <button class="modal-close" id="historyClose">✕</button>
      </div>
      <div class="modal-body" id="historyBody">
        <p class="loading-msg">Carregando histórico...</p>
      </div>
    </div>
  </div>

  <!-- FAB MOBILE -->
  <button class="fab" id="fabAdd">+</button>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- App (carregado por último, sem type="module") -->
  <script src="app.js"></script>
</body>
</html>
